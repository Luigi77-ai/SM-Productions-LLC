<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SM PRODUCTIONS</title>
  <meta
    name="description"
    content="SM Productions hero page with video background and intro navigation."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: "Inter", sans-serif;
      background: #02050b;
      color: #ffffff;
      overflow: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .hero-page {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      padding: 40px 20px;
      background: #02050b;
    }

    .hero-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.58) 0%, rgba(1,8,20,0.76) 100%),
        rgba(0, 8, 20, 0.2);
      z-index: 1;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      width: min(100%, 1180px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .hero-title {
      font-family: "Outfit", sans-serif;
      font-size: clamp(2.8rem, 7vw, 6.8rem);
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 26px;
      text-align: center;
    }

    .hero-text {
      max-width: 760px;
      margin: 0 auto 34px;
      font-size: clamp(1rem, 1.3vw, 1.28rem);
      line-height: 1.65;
      color: rgba(255,255,255,0.88);
      text-align: center;
    }

    .hero-nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .hero-nav a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 22px;
      min-height: 52px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(10, 14, 24, 0.32);
      color: #ffffff;
      font-size: 1rem;
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
      backdrop-filter: blur(8px);
    }

    .hero-nav a:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.24);
    }

    .hero-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px 28px;
      min-height: 58px;
      border-radius: 999px;
      background: #ffffff;
      color: #0a0d14;
      font-size: 1.05rem;
      font-weight: 700;
      transition: transform 0.2s ease, opacity 0.2s ease;
      margin-bottom: 26px;
    }

    .hero-cta:hover {
      transform: translateY(-2px);
      opacity: 0.94;
    }

    .instagram-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(10, 14, 24, 0.28);
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
      backdrop-filter: blur(8px);
    }

    .instagram-link:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.28);
    }

    .instagram-link svg {
      width: 24px;
      height: 24px;
    }

    @media (max-width: 900px) {
      .hero-title {
        letter-spacing: 0.12em;
      }

      .hero-nav {
        max-width: 760px;
      }
    }

    @media (max-width: 640px) {
      body {
        overflow: auto;
      }

      .hero-page {
        padding: 28px 18px;
      }

      .hero-title {
        font-size: clamp(2rem, 12vw, 3.5rem);
        margin-bottom: 20px;
      }

      .hero-text {
        font-size: 1rem;
        margin-bottom: 26px;
      }

      .hero-nav {
        gap: 10px;
        width: 100%;
      }

      .hero-nav a,
      .hero-cta {
        width: 100%;
      }

      .instagram-link {
        width: 56px;
        height: 56px;
      }
    }
  </style>
</head>
<body>
  <section class="hero-page">
    <video class="hero-video" autoplay muted loop playsinline>
      <source src="./assets/video.mp4" type="video/mp4" />
    </video>

    <div class="hero-overlay"></div>

    <div class="hero-content">
      <h1 class="hero-title">SM PRODUCTIONS</h1>

      <p class="hero-text">
        Cinematic fashion experiences, model casting, and high-impact event production in Hollywood, FL.
      </p>

      <nav class="hero-nav" aria-label="Hero navigation">
        <a href="#">Comming events</a>
        <a href="#">Model sign up</a>
        <a href="#">Media Photographer Sign-up</a>
        <a href="#">Contact</a>
      </nav>

      <a class="hero-cta" href="#">Let’s go</a>

      <a
        class="instagram-link"
        href="https://www.instagram.com/p/DXPU64DgloZ/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Open Instagram"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <rect x="3.5" y="3.5" width="17" height="17" rx="5"></rect>
          <circle cx="12" cy="12" r="4.2"></circle>
          <circle cx="17.3" cy="6.7" r="1"></circle>
        </svg>
      </a>
    </div>
  </section>
</body>
</html>
